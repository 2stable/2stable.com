<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}" class="h-100">
  <head>
    {% if site.google_analytics %}
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics }}');
      </script>
    {% endif %}
    <meta charset="UTF-8">
    <meta name="twitter:image" content="https://2stable.com/assets/img/aso-Icon-512.png">
    <meta name="twitter:description" content="We are a starting company of 4 members with big ambitions, we provide our creative solution to the day-to-day problems.">
    <meta name="twitter:app:name:iphone" content="Authenticator by 2Stable">
    <meta name="twitter:app:id:iphone" content="1538761576">
    <meta name="twitter:app:name:imac" content="ASO by 2Stable">
    <meta name="twitter:app:id:imac" content="1538761576">
    <meta property="og:image" content="https://2stable.com/assets/img/aso-Icon-512.png">
    <meta property="og:type" content="website">
{% seo %}
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Bootstrap CSS -->
    {{ site.bootstrap-css }}
    {{ site.bootstrap-icons }}
    <!-- local CSS -->
    {{ site.local-css }}
    <!-- microanalytics  -->
    {{ site.microanalytics }}
  </head>
  <body class="d-flex h-100">
    <div class="d-flex w-100 h-100 mx-auto flex-column">
        <div class="mb-auto">
            {%- include nav.html -%}
        </div>
        <div class="px-2 text-center container">
          {%- include main.html -%}
        </div>
        <div class="mt-auto">
            {%- include footer.html -%}
        </div>
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <!-- JavaScript Bundle with Popper -->
    {{ site.bootstrap-js-1 }}
    {{ site.bootstrap-js-2 }}
  </body>
</html>
