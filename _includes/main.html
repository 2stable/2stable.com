
<main class="px-5">
  <div class="row justify-content-center mb-2 pb-md-5">
    <div class="col-md-8">
      <h1 class="display-4">Welcome 👋</h1>
      <p class="lead fs-4 text-muted">{{ site.description }}</p>
    </div>
</div>
</main>
<div class="row">
  <div class="col-lg-4 pb-3">
    <div class="p-5 bg-light  border rounded h-100">
      <p><img class="rounded-img shadow-sm" src="/assets/img/auth-Icon-512.png" width="116" alt="Authenticator"></p>
      <p class="fw-bold h3">Authenticator</p>
      <a class="icon-link pb-3" href="https://authenticator.2stable.com">authenticator.2stable.com
        <svg class="bi" width="1em" height="1em"><use xlink:href="#chevron-right"/><symbol id="chevron-right" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"></path>
        </symbol></svg>
      </a>
      <p class="m-0">
      {% for app in site.authenticator %}    
      <a href="{{ app.url }}" target="_blank">
        <img class="m-2" src="{{ app.src }}" alt="{{ app.alt }}" height="48">
      </a>
      {% endfor %}
      </p>
    </div>
  </div>
  <div class="col-lg-4 pb-3">
    <div class="p-5 bg-light border rounded h-100">
      <p><img class="rounded-img shadow-sm" src="/assets/img/aso-Icon-512.png" width="116" alt="ASO"></p>
      <p class="fw-bold h3">ASO</p>
      <a class="icon-link pb-3" href="https://aso.2stable.com">aso.2stable.com
        <svg class="bi" width="1em" height="1em"><use xlink:href="#chevron-right"/><symbol viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"></path>
        </symbol></svg>
      </a>
      <p class="m-0">
        {% for app in site.aso %}    
        <a href="{{ app.url }}" target="_blank">
          <img class="m-2" src="{{ app.src }}" alt="{{ app.alt }}" height="48">
        </a>
        {% endfor %}
      </p>
    </div>
  </div>
  <div class="col-lg-4 pb-3">
    <div class="p-5 bg-light border rounded h-100">
      <p><img class="rounded-img shadow-sm" src="/assets/img/photovault-Icon-512.png" width="116" alt="Photo Vault"></p>
      <p class="fw-bold h3">Photo Vault</p>
      <a class="icon-link pb-3" href="https://photovault.2stable.com">photovault.2stable.com
        <svg class="bi" width="1em" height="1em"><use xlink:href="#chevron-right"/><symbol viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"></path>
        </symbol></svg>
      </a>
      <p class="m-0">
        {% for app in site.photo-vault %}    
        <a href="{{ app.url }}" target="_blank">
          <img class="m-2" src="{{ app.src }}" alt="{{ app.alt }}" height="48">
        </a>
        {% endfor %}
      </p>
    </div>
  </div>
</div>
